<div class="page-container">
  <div class="page-header">
    <h2>AspNet User Roles</h2>
    <button class="btn-primary" (click)="openCreate()">+ Assign Role</button>
  </div>
  <div class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</div>
  <div class="search-bar">
    <input type="text" placeholder="Search by userId or roleId..." [(ngModel)]="searchTerm" (input)="applySearch()" />
  </div>
  <div class="table-card">
    <div class="loading" *ngIf="loading">Loading...</div>
    <div class="table-wrapper" *ngIf="!loading">
      <table>
        <thead>
          <tr>
            <th>User ID</th>
            <th>Role ID</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of filtered">
            <td [title]="row.userId">{{ row.userId }}</td>
            <td [title]="row.roleId">{{ row.roleId }}</td>
            <td class="actions">
              <button class="btn-delete" (click)="delete(row.userId, row.roleId)">Remove</button>
            </td>
          </tr>
          <tr *ngIf="filtered.length === 0">
            <td colspan="3"><div class="empty-state"><p>No records found.</p></div></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal-overlay" *ngIf="showModal" (click)="closeModal()">
  <div class="modal" (click)="$event.stopPropagation()">
    <h3>Assign Role to User</h3>
    <div class="form-group">
      <label>User ID</label>
      <input type="text" [(ngModel)]="form.userId" />
    </div>
    <div class="form-group">
      <label>Role ID</label>
      <input type="text" [(ngModel)]="form.roleId" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" (click)="closeModal()">Cancel</button>
      <button class="btn-save" (click)="save()">Assign</button>
    </div>
  </div>
</div>
