<div class="layout-container">
  <!-- Sidebar -->
  <aside class="sidebar" [class.collapsed]="isSidebarCollapsed">
    <div class="sidebar-header">
      <h2 *ngIf="!isSidebarCollapsed" appTranslate="home"></h2>
      <button class="toggle-btn" (click)="toggleSidebar()">
        <fa-icon [icon]="faBars"></fa-icon>
      </button>
    </div>
    <nav class="sidebar-nav">
      <a routerLink="/index" routerLinkActive="active">
        <fa-icon [icon]="faHome"></fa-icon>
        <span *ngIf="!isSidebarCollapsed" appTranslate="home"></span>
      </a>
      <a routerLink="/profile" routerLinkActive="active">
        <fa-icon [icon]="faUser"></fa-icon>
        <span *ngIf="!isSidebarCollapsed" appTranslate="profile"></span>
      </a>
      <a routerLink="/product-sales" routerLinkActive="active">
        <fa-icon [icon]="faDollarSign"></fa-icon>
        <span *ngIf="!isSidebarCollapsed" appTranslate="product_sales"></span>
      </a>
      <a routerLink="/periodic-report" routerLinkActive="active">
        <fa-icon [icon]="faChartBar"></fa-icon>
        <span *ngIf="!isSidebarCollapsed">Periodic Report</span>
      </a>

      <div class="sidebar-section-label" *ngIf="!isSidebarCollapsed">Identity</div>

      <a routerLink="/asp-net-users" routerLinkActive="active">
        <fa-icon [icon]="faUsers"></fa-icon>
        <span *ngIf="!isSidebarCollapsed">Users</span>
      </a>
      <a routerLink="/asp-net-roles" routerLinkActive="active">
        <fa-icon [icon]="faShieldAlt"></fa-icon>
        <span *ngIf="!isSidebarCollapsed">Roles</span>
      </a>
      <a routerLink="/asp-net-role-claims" routerLinkActive="active">
        <fa-icon [icon]="faKey"></fa-icon>
        <span *ngIf="!isSidebarCollapsed">Role Claims</span>
      </a>
      <a routerLink="/asp-net-user-claims" routerLinkActive="active">
        <fa-icon [icon]="faUserTag"></fa-icon>
        <span *ngIf="!isSidebarCollapsed">User Claims</span>
      </a>
      <a routerLink="/asp-net-user-logins" routerLinkActive="active">
        <fa-icon [icon]="faUserLock"></fa-icon>
        <span *ngIf="!isSidebarCollapsed">User Logins</span>
      </a>
      <a routerLink="/asp-net-user-roles" routerLinkActive="active">
        <fa-icon [icon]="faUserShield"></fa-icon>
        <span *ngIf="!isSidebarCollapsed">User Roles</span>
      </a>
      <a routerLink="/asp-net-user-tokens" routerLinkActive="active">
        <fa-icon [icon]="faTicketAlt"></fa-icon>
        <span *ngIf="!isSidebarCollapsed">User Tokens</span>
      </a>
      <a routerLink="/user-refresh-tokens" routerLinkActive="active">
        <fa-icon [icon]="faSyncAlt"></fa-icon>
        <span *ngIf="!isSidebarCollapsed">Refresh Tokens</span>
      </a>

      <a (click)="onLogout()">
        <fa-icon [icon]="faSignOutAlt"></fa-icon>
        <span *ngIf="!isSidebarCollapsed" appTranslate="logout"></span>
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">
    <!-- Navbar -->
    <nav class="navbar">
      <div class="navbar-left">
        <button class="menu-btn" (click)="toggleSidebar()">
          <fa-icon [icon]="faBars"></fa-icon>
        </button>
      </div>
      <div class="navbar-right">
        <app-language-selector class="language-selector-container"></app-language-selector>
        <div class="user-info">
          <span class="user-name">{{userName}}</span>
        </div>
      </div>
    </nav>

    <!-- Page Content -->
    <div class="content-wrapper">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
