<div class="page-container">
  <div class="page-header">
    <h2>User Logins</h2>
  </div>

  <div class="filter-bar">
    <input type="text" placeholder="Enter User ID..." [(ngModel)]="userId" />
    <button class="btn-load" (click)="load()" [disabled]="!userId.trim()">Load</button>
  </div>

  <div class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</div>

  <div class="search-bar" *ngIf="logins.length > 0">
    <input type="text" placeholder="Search by provider or display name..." [(ngModel)]="searchTerm" (input)="applySearch()" />
  </div>

  <div class="table-card">
    <div class="loading" *ngIf="loading">Loading...</div>
    <div class="empty-state" *ngIf="!loading && !userId.trim()">
      <p>Enter a User ID above and click Load to view logins.</p>
    </div>
    <div class="table-wrapper" *ngIf="!loading && userId.trim()">
      <table>
        <thead>
          <tr>
            <th>Login Provider</th>
            <th>Provider Key</th>
            <th>Display Name</th>
            <th>User ID</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of filtered">
            <td>{{ row.loginProvider }}</td>
            <td [title]="row.providerKey">{{ row.providerKey }}</td>
            <td>{{ row.providerDisplayName }}</td>
            <td [title]="row.userId">{{ row.userId }}</td>
            <td class="actions">
              <button class="btn-delete" (click)="remove(row)">Remove</button>
            </td>
          </tr>
          <tr *ngIf="filtered.length === 0">
            <td colspan="5"><div class="empty-state"><p>No logins found for this user.</p></div></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
