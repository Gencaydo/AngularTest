<div class="page-container">
  <div class="page-header">
    <h2>AspNet Role Claims</h2>
    <button class="btn-primary" (click)="openCreate()">+ Add Claim</button>
  </div>
  <div class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</div>
  <div class="search-bar">
    <input type="text" placeholder="Search by roleId, claim type or value..." [(ngModel)]="searchTerm" (input)="applySearch()" />
  </div>
  <div class="table-card">
    <div class="loading" *ngIf="loading">Loading...</div>
    <div class="table-wrapper" *ngIf="!loading">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Role ID</th>
            <th>Claim Type</th>
            <th>Claim Value</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of filtered">
            <td>{{ row.id }}</td>
            <td [title]="row.roleId">{{ row.roleId }}</td>
            <td>{{ row.claimType }}</td>
            <td>{{ row.claimValue }}</td>
            <td class="actions">
              <button class="btn-edit" (click)="openEdit(row)">Edit</button>
              <button class="btn-delete" (click)="delete(row.id)">Delete</button>
            </td>
          </tr>
          <tr *ngIf="filtered.length === 0">
            <td colspan="5"><div class="empty-state"><p>No records found.</p></div></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal-overlay" *ngIf="showModal" (click)="closeModal()">
  <div class="modal" (click)="$event.stopPropagation()">
    <h3>{{ isEdit ? 'Edit Role Claim' : 'Add Role Claim' }}</h3>
    <div class="form-group">
      <label>Role ID</label>
      <input type="text" [(ngModel)]="form.roleId" />
    </div>
    <div class="form-group">
      <label>Claim Type</label>
      <input type="text" [(ngModel)]="form.claimType" />
    </div>
    <div class="form-group">
      <label>Claim Value</label>
      <input type="text" [(ngModel)]="form.claimValue" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" (click)="closeModal()">Cancel</button>
      <button class="btn-save" (click)="save()">{{ isEdit ? 'Update' : 'Create' }}</button>
    </div>
  </div>
</div>
