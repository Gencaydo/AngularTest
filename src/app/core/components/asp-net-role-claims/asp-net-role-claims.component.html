<div class="page-container">
  <div class="page-header">
    <h2>Role Claims</h2>
    <button class="btn-primary" (click)="openAdd()" [disabled]="!roleId.trim()">+ Add Claim</button>
  </div>

  <div class="filter-bar">
    <input type="text" placeholder="Enter Role ID..." [(ngModel)]="roleId" />
    <button class="btn-load" (click)="load()" [disabled]="!roleId.trim()">Load</button>
  </div>

  <div class="error-msg" *ngIf="errorMsg">{{ errorMsg }}</div>

  <div class="search-bar" *ngIf="claims.length > 0">
    <input type="text" placeholder="Search by claim type or value..." [(ngModel)]="searchTerm" (input)="applySearch()" />
  </div>

  <div class="table-card">
    <div class="loading" *ngIf="loading">Loading...</div>
    <div class="empty-state" *ngIf="!loading && !roleId.trim()">
      <p>Enter a Role ID above and click Load to view claims.</p>
    </div>
    <div class="table-wrapper" *ngIf="!loading && roleId.trim()">
      <table>
        <thead>
          <tr>
            <th>Claim Type</th>
            <th>Claim Value</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let row of filtered">
            <td>{{ row.claimType }}</td>
            <td>{{ row.claimValue }}</td>
            <td class="actions">
              <button class="btn-delete" (click)="remove(row)">Remove</button>
            </td>
          </tr>
          <tr *ngIf="filtered.length === 0">
            <td colspan="3"><div class="empty-state"><p>No claims found for this role.</p></div></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal-overlay" *ngIf="showModal" (click)="closeModal()">
  <div class="modal" (click)="$event.stopPropagation()">
    <h3>Add Claim to Role</h3>
    <div class="form-group">
      <label>Role ID</label>
      <input type="text" [value]="roleId" disabled />
    </div>
    <div class="form-group">
      <label>Claim Type</label>
      <input type="text" [(ngModel)]="form.claimType" />
    </div>
    <div class="form-group">
      <label>Claim Value</label>
      <input type="text" [(ngModel)]="form.claimValue" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" (click)="closeModal()">Cancel</button>
      <button class="btn-save" (click)="save()">Add</button>
    </div>
  </div>
</div>
